<style>
  /* header.header is set by postlcp.js before injecting this fragment */
  header.header {
    position: sticky;
    top: 0;
    z-index: var(--z-sticky);
    background: var(--color-bg);
    border-bottom: 1px solid var(--color-hairline);
  }

  /* Utility bar */
  .header-utility {
    border-bottom: 1px solid var(--color-hairline);
    font-size: var(--body-sm);
  }

  .header-utility .container {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: var(--spacing-lg);
    padding-block: 6px;
  }

  .header-utility a {
    color: var(--color-text-soft);
    text-decoration: none;
    transition: color 140ms ease;
  }

  .header-utility a:hover { color: var(--color-accent-ink); }

  .header-utility .lang { display: flex; gap: var(--spacing-sm); }

  .header-utility .lang [aria-current="true"] {
    color: var(--color-accent-ink);
    font-weight: 500;
  }

  /* Main nav bar */
  .header-main .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--spacing-lg);
    padding-block: var(--spacing-md);
  }

  .brand img { width: 170px; height: auto; }

  .primary-nav {
    display: flex;
    align-items: center;
    gap: var(--spacing-2xl);
  }

  .primary-nav a {
    font-family: var(--heading-font-family);
    font-weight: 500;
    text-decoration: none;
    color: var(--color-fg);
    transition: color 140ms ease;
  }

  .primary-nav a:hover { color: var(--color-accent-ink); }

  /* Icon buttons */
  .icon-search {
    background: none;
    border: 0;
    padding: var(--spacing-sm);
    cursor: pointer;
    color: var(--color-fg);
    display: inline-flex;
  }

  .icon-search:hover { color: var(--color-accent-ink); }

  /* Mobile menu — checkbox hack (no JS runs in fragments) */
  .mnav-checkbox { display: none; }

  .nav-burger {
    display: none;
    background: none;
    border: 1px solid var(--color-hairline);
    width: 44px;
    height: 44px;
    cursor: pointer;
    color: var(--color-fg);
    align-items: center;
    justify-content: center;
  }

  /* Search overlay — toggled by .icon-search via scripts/postlcp.js */
  .header-search[hidden] { display: none; }

  .header-search {
    border-top: 1px solid var(--color-hairline);
    background: var(--color-bg);
  }

  .header-search .container { padding-block: var(--spacing-md); }

  .header-search-form {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    border-bottom: 2px solid var(--color-accent-ink);
  }

  .header-search-form input {
    flex: 1;
    border: 0;
    background: transparent;
    font-family: var(--heading-font-family);
    font-size: 1.25rem;
    color: var(--color-fg);
    padding: var(--spacing-sm) 0;
    outline: none;
  }

  .header-search-form button {
    background: none;
    border: 0;
    padding: var(--spacing-sm);
    cursor: pointer;
    color: var(--color-accent-ink);
    display: inline-flex;
  }

  .header-search-results { margin-top: var(--spacing-sm); }

  .header-search-results a {
    display: block;
    padding: 10px var(--spacing-sm);
    text-decoration: none;
    color: var(--color-fg);
    border-bottom: 1px solid var(--color-hairline);
  }

  .header-search-results a:hover,
  .header-search-results a.is-active { background: var(--color-accent-tint); }

  .header-search-results .hsr-title { font-weight: 500; }

  .header-search-results .hsr-cat {
    font-size: var(--body-sm);
    color: var(--color-text-soft);
  }

  .header-search-status {
    padding: var(--spacing-md) 0;
    color: var(--color-text-soft);
    font-size: var(--body-sm);
  }

  /* Mobile breakpoint */
  @media (width <= 640px) {
    .nav-burger { display: inline-flex; }
    .icon-search { order: 3; }

    .primary-nav {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-hairline);
      box-shadow: var(--shadow-card);
      z-index: var(--z-nav-panel);
    }

    /* CSS-only open state via checkbox */
    .mnav-checkbox:checked ~ .header-main .primary-nav { display: flex; }

    .primary-nav a {
      padding: 14px var(--spacing-lg);
      border-top: 1px solid var(--color-hairline);
    }

    .header-main .container { position: relative; flex-wrap: wrap; }

    .header-utility .container {
      justify-content: center;
      gap: var(--spacing-md);
      flex-wrap: wrap;
    }
  }
</style>

    </label>
  </div>
</div>

<div class="header-search" id="header-search" hidden>
  <div class="container">
    <form class="header-search-form" role="search">
      <input type="search" name="q" placeholder="Search hirslanden.ch" aria-label="Enter a search term" autocomplete="off" maxlength="80">
      <button type="submit" aria-label="Search">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </form>
    <div class="header-search-results" role="listbox" aria-label="Search results"></div>
  </div>
</div>
