<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Prototype ↔ EDS Comparison</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bar: 44px;
    --accent: #0094d4;
    --fg: #534c46;
    --bg: #f0efed;
    --hairline: #ddd;
    --font: -apple-system, "Helvetica Neue", sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--fg);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ─────────────────────────────────────────────────────── */
  #bar {
    height: var(--bar);
    flex-shrink: 0;
    background: #fff;
    border-bottom: 1px solid var(--hairline);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    user-select: none;
  }

  #bar .logo { font-size: 13px; font-weight: 700; letter-spacing: -.01em; color: var(--fg); margin-right: 4px; }

  #bar select {
    flex: 1;
    max-width: 340px;
    font: inherit;
    font-size: 13px;
    background: var(--bg);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    padding: 4px 8px;
    color: var(--fg);
    cursor: pointer;
  }

  #bar button {
    height: 28px;
    padding: 0 10px;
    border: 1px solid var(--hairline);
    border-radius: 6px;
    background: #fff;
    font: inherit;
    font-size: 13px;
    color: var(--fg);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  #bar button:hover { background: var(--bg); }
  #bar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  #counter { font-size: 12px; color: #999; min-width: 48px; text-align: center; }

  .spacer { flex: 1; }

  #zoom-group { display: flex; gap: 4px; }
  #zoom-group button { min-width: 60px; justify-content: center; }

  /* ── Labels row ──────────────────────────────────────────────────── */
  #labels {
    height: 26px;
    flex-shrink: 0;
    display: flex;
    background: var(--bg);
    border-bottom: 1px solid var(--hairline);
  }
  .label {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: #999;
    gap: 6px;
  }
  .label:first-child { border-right: 1px solid var(--hairline); }
  .label .dot { width: 7px; height: 7px; border-radius: 50%; }
  .label .dot.proto { background: #7c5cfc; }
  .label .dot.eds   { background: var(--accent); }

  /* ── Frames area ─────────────────────────────────────────────────── */
  #frames {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .pane {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .pane:first-child { border-right: 2px solid var(--hairline); }

  .pane iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
    transform-origin: top left;
    background: #fff;
  }

  /* zoom: scaled viewport — iframe is wider, scaled down */
  .pane.scaled iframe {
    height: calc(100% / var(--scale, 1));
    transform: scale(var(--scale, 1));
  }
</style>
</head>
<body>

<div id="bar">
  <span class="logo">↔ Compare</span>

  <button id="btn-prev" title="Previous pair">‹</button>
  <span id="counter">1 / 18</span>
  <button id="btn-next" title="Next pair">›</button>

  <select id="pair-select"></select>

  <div class="spacer"></div>

  <div id="zoom-group">
    <button data-zoom="1"   class="active">100%</button>
    <button data-zoom=".75">75%</button>
    <button data-zoom=".5" >50%</button>
  </div>
</div>

<div id="labels">
  <div class="label"><span class="dot proto"></span> Prototype</div>
  <div class="label"><span class="dot eds"></span> EDS (localhost)</div>
</div>

<div id="frames">
  <div class="pane" id="pane-proto"><iframe id="frame-proto" title="Prototype"></iframe></div>
  <div class="pane" id="pane-eds"  ><iframe id="frame-eds"   title="EDS page"></iframe></div>
</div>

<script>
const BASE = 'http://localhost:3001';

const PAIRS = [
  { label: 'Home — variant A',        proto: 'home-A-proposed.html',        eds: '/' },
  { label: 'Home — variant B',        proto: 'home-B-proposed.html',        eds: '/' },
  { label: 'Home — variant C',        proto: 'home-C-proposed.html',        eds: '/' },
  { label: 'Home — variant D',        proto: 'home-D-proposed.html',        eds: '/' },
  { label: 'Home — variant E',        proto: 'home-E-proposed.html',        eds: '/' },
  { label: 'Home — variant F',        proto: 'home-F-proposed.html',        eds: '/' },
  { label: 'Clinic listing',          proto: 'clinic-listing-proposed.html', eds: '/de/corporate/kliniken-und-zentren' },
  { label: 'Clinic detail',           proto: 'clinic-detail-proposed.html',  eds: '/de/klinik-linde/home' },
  { label: 'Content / editorial',     proto: 'content-page-proposed.html',   eds: '/de/corporate/ueber-uns/hingabe' },
  { label: 'Disease detail',          proto: 'disease-detail-proposed.html', eds: '/de/corporate/krankheitsbilder/brustkrebs' },
  { label: 'Doctor profile',          proto: 'doctor-profile-proposed.html', eds: '/de/corporate/aerzte/3/dr-med-christof-abaecherli' },
  { label: 'Event listing',           proto: 'event-listing-proposed.html',  eds: '/de/corporate/kurse-und-veranstaltungen' },
  { label: 'Event detail',            proto: 'event-detail-proposed.html',   eds: '/de/klinik-linde/kurse-veranstaltungen/schwangerschaft-geburt/informationsabend-geburt' },
  { label: 'News listing',            proto: 'news-listing-proposed.html',   eds: '/de/corporate/medien-und-news/medienmitteilungen-und-news' },
  { label: 'News article',            proto: 'news-article-proposed.html',   eds: '/de/corporate/medien-und-news/medienmitteilungen-und-news/centre-de-chirurgie-ambulatoire-de-geneve' },
  { label: 'Patient info',            proto: 'patient-info-proposed.html',   eds: '/de/corporate/klinikaufenthalt' },
  { label: 'Specialty / topic',       proto: 'specialty-topic-proposed.html',eds: '/de/corporate/fuer-alle-folgen-des-lebens/kardiologie' },
  { label: 'Treatment detail',        proto: 'treatment-detail-proposed.html',eds: '/de/corporate/behandlungen/bruchoperationen-hernienoperationen' },
];

const select    = document.getElementById('pair-select');
const counter   = document.getElementById('counter');
const frameProto = document.getElementById('frame-proto');
const frameEds   = document.getElementById('frame-eds');
const paneProto  = document.getElementById('pane-proto');
const paneEds    = document.getElementById('pane-eds');

let current = 0;
let scale = 1;

// Populate select
PAIRS.forEach((p, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = `${i + 1}. ${p.label}`;
  select.append(opt);
});

function applyZoom() {
  [paneProto, paneEds].forEach(pane => {
    if (scale === 1) {
      pane.classList.remove('scaled');
      pane.style.removeProperty('--scale');
    } else {
      pane.classList.add('scaled');
      pane.style.setProperty('--scale', scale);
    }
  });
}

function load(idx) {
  current = ((idx % PAIRS.length) + PAIRS.length) % PAIRS.length;
  const p = PAIRS[current];
  frameProto.src = `${BASE}/stardust/prototypes/${p.proto}`;
  frameEds.src   = `${BASE}${p.eds}`;
  counter.textContent = `${current + 1} / ${PAIRS.length}`;
  select.value = current;
  applyZoom();
}

select.addEventListener('change', () => load(Number(select.value)));
document.getElementById('btn-prev').addEventListener('click', () => load(current - 1));
document.getElementById('btn-next').addEventListener('click', () => load(current + 1));

document.getElementById('zoom-group').addEventListener('click', e => {
  const btn = e.target.closest('[data-zoom]');
  if (!btn) return;
  scale = Number(btn.dataset.zoom);
  document.querySelectorAll('#zoom-group button').forEach(b => b.classList.toggle('active', b === btn));
  applyZoom();
});

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') load(current + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   load(current - 1);
});

load(0);
</script>
</body>
</html>
